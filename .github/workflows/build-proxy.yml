name: Build Proxy Image

on:
  push:
    branches: [ main ]
    paths:
      - 'proxy/**'
      - '.github/workflows/build-proxy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push proxy image
        uses: docker/build-push-action@v6
        with:
          context: ./proxy
          file: ./proxy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nodeget-statusshow-proxy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nodeget-statusshow-proxy:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nodeget-statusshow-proxy:latest
            ghcr.io/${{ github.repository_owner }}/nodeget-statusshow-proxy:${{ github.sha }}
