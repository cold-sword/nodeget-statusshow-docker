name: Sync & Build StatusShow

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时检查一次上游新 Release
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 获取上游最新 Release Tag ────────────────────────────
      - name: Get upstream latest release tag
        id: upstream
        run: |
          TAG=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/NodeSeekDev/NodeGet-StatusShow/releases/latest \
            | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # ── 2. Checkout 本仓库 ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 3. 与上次构建对比，决定是否跳过 ────────────────────────
      - name: Check if rebuild needed
        id: check
        run: |
          LAST=""
          [ -f last_upstream_tag ] && LAST=$(cat last_upstream_tag)
          CURRENT="${{ steps.upstream.outputs.tag }}"
          echo "Last:    $LAST"
          echo "Current: $CURRENT"
          [ "$LAST" = "$CURRENT" ] \
            && echo "skip=true"  >> $GITHUB_OUTPUT \
            || echo "skip=false" >> $GITHUB_OUTPUT

      # ── 4. 以下步骤仅在有新版本时执行 ──────────────────────────
      - name: Set up QEMU
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ./statusshow
          file: ./statusshow/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            STATUSSHOW_REPO=https://github.com/NodeSeekDev/NodeGet-StatusShow.git
            STATUSSHOW_REF=${{ steps.upstream.outputs.tag }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nodeget-statusshow:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nodeget-statusshow:${{ steps.upstream.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/nodeget-statusshow:latest
            ghcr.io/${{ github.repository_owner }}/nodeget-statusshow:${{ steps.upstream.outputs.tag }}

      # ── 5. 记录本次构建的 Tag，防止重复构建 ────────────────────
      - name: Save upstream tag
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "${{ steps.upstream.outputs.tag }}" > last_upstream_tag
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_upstream_tag
          git commit -m "chore: sync upstream ${{ steps.upstream.outputs.tag }} [skip ci]"
          git push
