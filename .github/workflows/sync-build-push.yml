name: Sync & Build StatusShow

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ── 1. 检查上游是否有新版本 ──────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      tag:  ${{ steps.upstream.outputs.tag }}
      skip: ${{ steps.check.outputs.skip }}

    steps:
      - name: Get upstream latest release tag
        id: upstream
        run: |
          TAG=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/NodeSeekDev/NodeGet-StatusShow/releases/latest \
            | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if rebuild needed
        id: check
        run: |
          LAST=""
          [ -f last_upstream_tag ] && LAST=$(cat last_upstream_tag)
          CURRENT="${{ steps.upstream.outputs.tag }}"
          echo "Last:    $LAST"
          echo "Current: $CURRENT"
          [ "$LAST" = "$CURRENT" ] \
            && echo "skip=true"  >> $GITHUB_OUTPUT \
            || echo "skip=false" >> $GITHUB_OUTPUT

  # ── 2. 各平台原生构建（无 QEMU）────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.skip == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm   # GitHub 原生 arm64 Runner
            suffix: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (platform image)
        uses: docker/build-push-action@v6
        with:
          context: ./statusshow
          file: ./statusshow/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            STATUSSHOW_REPO=https://github.com/NodeSeekDev/NodeGet-StatusShow.git
            STATUSSHOW_REF=${{ needs.check.outputs.tag }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nodeget-statusshow:${{ needs.check.outputs.tag }}-${{ matrix.suffix }}
            ghcr.io/${{ github.repository_owner }}/nodeget-statusshow:${{ needs.check.outputs.tag }}-${{ matrix.suffix }}

  # ── 3. 合并多架构 manifest ────────────────────────────────
  merge:
    needs: [check, build]
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge manifest (DockerHub)
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/nodeget-statusshow"
          docker buildx imagetools create \
            -t ${IMAGE}:latest \
            -t ${IMAGE}:${TAG} \
            ${IMAGE}:${TAG}-amd64 \
            ${IMAGE}:${TAG}-arm64

      - name: Merge manifest (ghcr.io)
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/nodeget-statusshow"
          docker buildx imagetools create \
            -t ${IMAGE}:latest \
            -t ${IMAGE}:${TAG} \
            ${IMAGE}:${TAG}-amd64 \
            ${IMAGE}:${TAG}-arm64

  # ── 4. 记录本次构建 Tag ───────────────────────────────────
  save-tag:
    needs: [check, merge]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save upstream tag
        run: |
          echo "${{ needs.check.outputs.tag }}" > last_upstream_tag
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_upstream_tag
          git commit -m "chore: sync upstream ${{ needs.check.outputs.tag }} [skip ci]"
          git push
